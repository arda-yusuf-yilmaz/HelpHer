name: Windows desktop build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate firebase_options.dart
        shell: pwsh
        run: |
          @"
          // Generated by CI — do not commit.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) return web;
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                case TargetPlatform.macOS:
                  return macos;
                case TargetPlatform.windows:
                  return windows;
                default:
                  throw UnsupportedError('Unsupported platform');
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_WEB_API_KEY }}',
              appId: '1:84736062319:web:699b46eb54a09b83faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              authDomain: '${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              measurementId: 'G-GPHX0MX7P7',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_ANDROID_API_KEY }}',
              appId: '1:84736062319:android:ad76082cf8260904faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_IOS_API_KEY }}',
              appId: '1:84736062319:ios:b31c7c1c85b298d8faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              iosBundleId: 'com.example.helpher',
            );

            static const FirebaseOptions macos = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_IOS_API_KEY }}',
              appId: '1:84736062319:ios:b31c7c1c85b298d8faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              iosBundleId: 'com.example.helpher',
            );

            static const FirebaseOptions windows = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_WEB_API_KEY }}',
              appId: '1:84736062319:web:972f49ebdc978838faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              authDomain: '${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              measurementId: 'G-NVPZK0JT6J',
            );
          }
          "@ | Set-Content -Path lib/firebase_options.dart -Encoding UTF8

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: helpher-windows-release
          path: build/windows/x64/runner/Release/**
