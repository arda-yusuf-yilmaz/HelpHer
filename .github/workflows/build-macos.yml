name: macOS desktop build

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config
        run: bash scripts/restore-firebase-config.sh
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          MACOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          REQUIRE_MACOS_GOOGLE_SERVICE_INFO_PLIST: "true"

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: "-"
          FLUTTER_XCODE_PROVISIONING_PROFILE_SPECIFIER: ""

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: HelpHer-macos-release
          path: build/macos/Build/Products/Release/
