name: Release (desktop builds)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0-rc2)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config
        shell: bash
        run: bash scripts/restore-firebase-config.sh
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          MACOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "build/windows/x64/runner/Release"
          if (!(Test-Path $sourceDir)) {
            throw "Windows release output not found at $sourceDir"
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "installer/windows/helpher.iss" `
            "/DSourceDir=$sourceDir" `
            "/DAppVersion=$version" `
            "/DOutputBaseFilename=HelpHer-$tag-Setup-Windows-x64"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config
        run: bash scripts/restore-firebase-config.sh
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          MACOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          REQUIRE_MACOS_GOOGLE_SERVICE_INFO_PLIST: "true"

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            macos/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Build macOS release (unsigned)
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: "-"
          FLUTTER_XCODE_PROVISIONING_PROFILE_SPECIFIER: ""

      - name: Sign macOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/HelpHer.app"
          ID="Developer ID Application: Arda Yusuf YILMAZ ($APPLE_TEAM_ID)"

          # Install the provisioning profile so macOS accepts restricted
          # entitlements (keychain-access-groups, aps-environment) in the
          # Developer ID build.
          # ⚠️  The profile must include the Push Notifications capability.
          # Regenerate it in Apple Developer → Profiles if codesign rejects
          # the aps-environment entitlement.
          PP_PATH="$RUNNER_TEMP/build.provisionprofile"
          echo "$MACOS_PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -o - -)

          # ── Diagnostic: print profile UUID and entitlements ──
          echo "▶ Provisioning profile UUID: $PP_UUID"
          echo "▶ Profile entitlements / capabilities:"
          security cms -D -i "$PP_PATH" \
            | plutil -extract Entitlements xml1 -o - - \
            || true
          # ─────────────────────────────────────────────────────────────────

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".provisionprofile
          # Embed in the app bundle (required for restricted entitlements)
          cp "$PP_PATH" "$APP/Contents/embedded.provisionprofile"

          # Expand Xcode build variables in entitlements before passing to codesign.
          BUNDLE_ID=$(defaults read "$(pwd)/$APP/Contents/Info.plist" CFBundleIdentifier)
          ENTITLEMENTS="$RUNNER_TEMP/processed.entitlements"
          sed "s/\$(AppIdentifierPrefix)/${APPLE_TEAM_ID}./g; \
               s/\$(CFBundleIdentifier)/${BUNDLE_ID}/g" \
            macos/Runner/Release.entitlements > "$ENTITLEMENTS"
          echo "Entitlements after expansion:"
          cat "$ENTITLEMENTS"

          # 1. Sign all dylibs (no --options runtime — they don't need it)
          find "$APP/Contents/Frameworks" -name "*.dylib" | while read f; do
            codesign --force --sign "$ID" "$f"
          done

          # 2. Sign frameworks inside-out: deepest paths first
          find "$APP/Contents/Frameworks" -name "*.framework" -print \
            | awk '{ print length, $0 }' | sort -rn | awk '{print $2}' \
            | while read f; do
              codesign --force --sign "$ID" "$f"
            done

          # 3. Sign the app bundle with hardened runtime + entitlements
          codesign --force --verify --verbose \
            --sign "$ID" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP"

          # 4. Verify the result
          codesign --verify --deep --strict "$APP"
          echo "✓ Signed and verified $APP"

      - name: Install DMG tools and generate background
        run: |
          pip3 install --quiet --break-system-packages Pillow dmgbuild
          python3 installer/macos/generate-dmg-background.py

      - name: Package macOS build (dmg)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="${{ inputs.tag }}"
          fi
          APP_PATH="build/macos/Build/Products/Release/HelpHer.app"
          DMG="dist/HelpHer-${TAG}-macOS.dmg"
          if [ ! -d "${APP_PATH}" ]; then
            echo "Expected app not found at ${APP_PATH}"
            exit 1
          fi
          mkdir -p dist
          python3 -m dmgbuild \
            -s installer/macos/dmgbuild-settings.py \
            -D app="${APP_PATH}" \
            "HelpHer" \
            "${DMG}"
          echo "Created ${DMG}"

      - name: Notarize dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/*.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/*.dmg

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  build-android:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore Firebase config
        run: bash scripts/restore-firebase-config.sh
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          MACOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          REQUIRE_ANDROID_GOOGLE_SERVICES_JSON: "true"

      - name: Restore Android signing key
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/app/helpher-release.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=helpher-release.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build Android App Bundle (Play Store)
        run: flutter build appbundle --release

      - name: Build Android APK (direct download)
        run: flutter build apk --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-android]
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - name: Download macOS dmg
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist

      - name: Download Android release
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.apk
          generate_release_notes: true
