name: Release (desktop builds)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate firebase_options.dart
        shell: pwsh
        run: |
          @"
          // Generated by CI — do not commit.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) return web;
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                case TargetPlatform.macOS:
                  return macos;
                case TargetPlatform.windows:
                  return windows;
                default:
                  throw UnsupportedError('Unsupported platform');
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_WEB_API_KEY }}',
              appId: '1:84736062319:web:699b46eb54a09b83faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              authDomain: '${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              measurementId: 'G-GPHX0MX7P7',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_ANDROID_API_KEY }}',
              appId: '1:84736062319:android:ad76082cf8260904faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_IOS_API_KEY }}',
              appId: '1:84736062319:ios:b31c7c1c85b298d8faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              iosBundleId: 'com.example.helpher',
            );

            static const FirebaseOptions macos = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_IOS_API_KEY }}',
              appId: '1:84736062319:ios:b31c7c1c85b298d8faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              iosBundleId: 'com.example.helpher',
            );

            static const FirebaseOptions windows = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_WEB_API_KEY }}',
              appId: '1:84736062319:web:972f49ebdc978838faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              authDomain: '${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              measurementId: 'G-NVPZK0JT6J',
            );
          }
          "@ | Set-Content -Path lib/firebase_options.dart -Encoding UTF8

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "build/windows/x64/runner/Release"
          if (!(Test-Path $sourceDir)) {
            throw "Windows release output not found at $sourceDir"
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "installer/windows/helpher.iss" `
            "/DSourceDir=$sourceDir" `
            "/DAppVersion=$version" `
            "/DOutputBaseFilename=HelpHer-$tag-Setup-Windows-x64"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          // Generated by CI — do not commit.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) return web;
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                case TargetPlatform.macOS:
                  return macos;
                case TargetPlatform.windows:
                  return windows;
                default:
                  throw UnsupportedError('Unsupported platform');
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_WEB_API_KEY }}',
              appId: '1:84736062319:web:699b46eb54a09b83faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              authDomain: '${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              measurementId: 'G-GPHX0MX7P7',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_ANDROID_API_KEY }}',
              appId: '1:84736062319:android:ad76082cf8260904faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_IOS_API_KEY }}',
              appId: '1:84736062319:ios:b31c7c1c85b298d8faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              iosBundleId: 'com.example.helpher',
            );

            static const FirebaseOptions macos = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_IOS_API_KEY }}',
              appId: '1:84736062319:ios:b31c7c1c85b298d8faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              iosBundleId: 'com.example.helpher',
            );

            static const FirebaseOptions windows = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_WEB_API_KEY }}',
              appId: '1:84736062319:web:972f49ebdc978838faae9a',
              messagingSenderId: '84736062319',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              authDomain: '${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com',
              storageBucket: '${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app',
              measurementId: 'G-NVPZK0JT6J',
            );
          }
          EOF

      - name: Test
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS build (dmg)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          APP_PATH="build/macos/Build/Products/Release/helpher.app"
          DMG="HelpHer-${TAG}-macOS.dmg"
          if [ ! -d "${APP_PATH}" ]; then
            echo "Expected app not found at ${APP_PATH}"
            exit 1
          fi
          mkdir -p dist
          STAGE="$(mktemp -d)"
          cp -R "${APP_PATH}" "${STAGE}/"
          ln -s /Applications "${STAGE}/Applications"
          hdiutil create -volname "HelpHer" -srcfolder "${STAGE}" -ov -format UDZO "dist/${DMG}"
          echo "Created dist/${DMG}"

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - name: Download macOS dmg
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
          generate_release_notes: true
