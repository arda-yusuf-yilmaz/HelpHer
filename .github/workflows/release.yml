name: Release (desktop builds)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows build (zip)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "HelpHer-$tag-windows-x64.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $zip
          Write-Output "Created $zip"

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: HelpHer-*-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS build (zip)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          APP_PATH="build/macos/Build/Products/Release/helpher.app"
          ZIP="HelpHer-${TAG}-macos.zip"
          if [ ! -d "${APP_PATH}" ]; then
            echo "Expected app not found at ${APP_PATH}"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP}"
          echo "Created ${ZIP}"

      - name: Upload macOS asset
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: HelpHer-*-macos.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: dist

      - name: Download macOS asset
        uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
          generate_release_notes: true
