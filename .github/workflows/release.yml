name: Release (desktop builds)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config
        shell: bash
        run: bash scripts/restore-firebase-config.sh
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          MACOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "build/windows/x64/runner/Release"
          if (!(Test-Path $sourceDir)) {
            throw "Windows release output not found at $sourceDir"
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "installer/windows/helpher.iss" `
            "/DSourceDir=$sourceDir" `
            "/DAppVersion=$version" `
            "/DOutputBaseFilename=HelpHer-$tag-Setup-Windows-x64"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config
        run: bash scripts/restore-firebase-config.sh
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          MACOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          REQUIRE_MACOS_GOOGLE_SERVICE_INFO_PLIST: "true"

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Build macOS release (unsigned)
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: "-"
          FLUTTER_XCODE_PROVISIONING_PROFILE_SPECIFIER: ""

      - name: Sign macOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/HelpHer.app"
          ID="Developer ID Application: Arda Yusuf YILMAZ ($APPLE_TEAM_ID)"

          # codesign does not expand Xcode build variables, so pre-process
          # the entitlements file to substitute $(AppIdentifierPrefix) and
          # $(CFBundleIdentifier) before passing it to codesign.
          BUNDLE_ID=$(defaults read "$(pwd)/$APP/Contents/Info.plist" CFBundleIdentifier)
          ENTITLEMENTS="$RUNNER_TEMP/processed.entitlements"
          sed "s/\$(AppIdentifierPrefix)/${APPLE_TEAM_ID}./g; \
               s/\$(CFBundleIdentifier)/${BUNDLE_ID}/g" \
            macos/Runner/Release.entitlements > "$ENTITLEMENTS"
          echo "Entitlements after expansion:"
          cat "$ENTITLEMENTS"

          # 1. Sign all dylibs (no --options runtime — they don't need it)
          find "$APP/Contents/Frameworks" -name "*.dylib" | while read f; do
            codesign --force --sign "$ID" "$f"
          done

          # 2. Sign frameworks inside-out: deepest paths first
          find "$APP/Contents/Frameworks" -name "*.framework" -print \
            | awk '{ print length, $0 }' | sort -rn | awk '{print $2}' \
            | while read f; do
              codesign --force --sign "$ID" "$f"
            done

          # 3. Sign the app bundle with hardened runtime + entitlements
          codesign --force --verify --verbose \
            --sign "$ID" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP"

          # 4. Verify the result
          codesign --verify --deep --strict "$APP"
          echo "✓ Signed and verified $APP"

      - name: Package macOS build (dmg)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          APP_PATH="build/macos/Build/Products/Release/HelpHer.app"
          DMG="HelpHer-${TAG}-macOS.dmg"
          if [ ! -d "${APP_PATH}" ]; then
            echo "Expected app not found at ${APP_PATH}"
            exit 1
          fi
          mkdir -p dist
          STAGE="$(mktemp -d)"
          cp -R "${APP_PATH}" "${STAGE}/"
          ln -s /Applications "${STAGE}/Applications"
          hdiutil create -volname "HelpHer" -srcfolder "${STAGE}" -ov -format UDZO "dist/${DMG}"
          echo "Created dist/${DMG}"

      - name: Notarize dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/*.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/*.dmg

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - name: Download macOS dmg
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
          generate_release_notes: true
